server:
  port: 8080

spring:
  application:
    name: business-continuity-planner

  # ── Database ──────────────────────────────────────────────────────────────
  # Local dev: H2 in-memory (no Docker needed)
  # Docker/Prod: set SPRING_DATASOURCE_URL env var to a PostgreSQL URL
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:bcpdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # ── Flyway (runs SQL migrations in db/migration/) ─────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── H2 browser console (only useful in local dev) ─────────────────────────
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

  # ── File upload limits ────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# ── Swagger / OpenAPI UI at http://localhost:8080/swagger-ui.html ──────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    tags-sorter: alpha

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
