version: "3.9"

# ── Five services: postgres, redis, backend, ai-service, frontend ────────────

services:

  # ── 1. PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: bcp-postgres
    environment:
      POSTGRES_DB:       bcp_db
      POSTGRES_USER:     bcp_user
      POSTGRES_PASSWORD: bcp_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcp_user -d bcp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bcp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 3. Spring Boot Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bcp-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/bcp_db
      SPRING_DATASOURCE_DRIVER:   org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: bcp_user
      SPRING_DATASOURCE_PASSWORD: bcp_pass
      HIBERNATE_DIALECT:          org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO:               validate
      H2_CONSOLE_ENABLED:         "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── 4. Python AI Service ────────────────────────────────────────────────────
  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: bcp-ai
    ports:
      - "5000:5000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── 5. React Frontend (Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bcp-frontend
    ports:
      - "80:80"
    environment:
      VITE_API_BASE_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
